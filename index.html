<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YouTube Focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Orbitron:wght@400..900&family=Oswald:wght@200..700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png">
  <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png">
  <meta name="apple-mobile-web-app-title" content="YouTube Focus">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: "Nunito", sans-serif;
      background-color: #0a1628;
      color: #f1f1f1;
      min-height: 100vh;
      max-width: 100vw;
      overflow-x: hidden;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      position: fixed;
      left: -260px;
      top: 0;
      width: 250px;
      height: 100%;
      background: rgba(90, 0, 0, 0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding-top: 70px;
      opacity: 0;
      transition: left 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
      z-index: 1000;
      border-right: 1px solid rgba(255,255,255,0.08);
      box-shadow: 4px 0 32px rgba(0,0,0,0.5);
    }

    .sidebar.active {
      left: 0;
      opacity: 1;
    }

    .sidebar a {
      display: block;
      padding: 15px 25px;
      color: white;
      text-decoration: none;
      font-size: 18px;
      font-weight: 600;
      transition: background 0.2s, padding-left 0.2s;
      border-radius: 0 12px 12px 0;
      margin-right: 12px;
    }

    .sidebar a:hover {
      background: rgba(255,255,255,0.15);
      padding-left: 32px;
    }

    /* ===== TOP BAR (shared) ===== */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      z-index: 1100; /* above sidebar */
      background: transparent;
      pointer-events: none; /* let clicks through except children */
    }

    .top-bar > * {
      pointer-events: all;
    }

    /* Glassmorphism bar bg for focus page */
    .top-bar.focus-bar {
      background: rgba(10, 22, 40, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 2px 24px rgba(0,0,0,0.4);
    }

    .app-title {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      user-select: none;
    }

    .app-title .yt-icon {
      width: 30px;
      height: 21px;
      background: #ff0000;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 12px rgba(255,0,0,0.45);
    }

    .app-title .yt-icon::after {
      content: '';
      width: 0;
      height: 0;
      border-left: 9px solid white;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      margin-left: 2px;
    }

    .app-title-text {
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .app-title-sub {
      font-weight: 400;
      opacity: 0.6;
    }

    .profile-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #1a1a2e;
      border: 1.5px solid rgba(255,255,255,0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      transition: border-color 0.2s;
    }

    .profile-icon:hover {
      border-color: rgba(255,255,255,0.5);
    }

    .profile-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ===== HAMBURGER ===== */
    .hamburger {
      width: 30px;
      height: 24px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      z-index: 1200; /* always above sidebar */
      position: relative;
      padding: 2px 0;
    }

    .hamburger span {
      display: block;
      height: 2.5px;
      width: 100%;
      background: white;
      border-radius: 3px;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease;
    }

    .hamburger.active span:nth-child(1) {
      transform: translateY(8.75px) rotate(45deg);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }

    .hamburger.active span:nth-child(3) {
      transform: translateY(-8.75px) rotate(-45deg);
    }

    /* ===== LANDING PAGE ===== */
    .landing-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      position: relative;
    }

    /* Radial background glow */
    .landing-page::before {
      content: '';
      position: fixed;
      top: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(124,58,237,0.18) 0%, rgba(13,148,136,0.10) 50%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .welcome-section {
      text-align: center;
      margin-bottom: 52px;
      margin-top: 80px;
      position: relative;
      z-index: 1;
    }

    .welcome-line1 {
      font-size: 38px;
      font-weight: 800;
      color: white;
      line-height: 1.2;
      letter-spacing: -0.5px;
    }

    .welcome-line2 {
      font-size: 22px;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      line-height: 1.4;
      margin-top: 6px;
      letter-spacing: 0.3px;
    }

    /* Mode buttons */
    .mode-buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
      max-width: 320px;
      position: relative;
      z-index: 1;
    }

    .mode-btn {
      position: relative;
      width: 100%;
      padding: 18px 24px;
      border-radius: 18px;
      font-size: 17px;
      font-family: "Nunito", sans-serif;
      font-weight: 700;
      cursor: pointer;
      border: none;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      overflow: hidden;
      letter-spacing: 0.2px;
    }

    .mode-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.08);
      opacity: 0;
      transition: opacity 0.18s;
      border-radius: inherit;
    }

    .mode-btn:hover::after { opacity: 1; }
    .mode-btn:active { transform: scale(0.97); }

    .casual-btn {
      background: linear-gradient(135deg, #7c3aed 0%, #db2777 55%, #f43f5e 100%);
      box-shadow: 0 4px 24px rgba(124,58,237,0.38), 0 0 0 1px rgba(255,255,255,0.08) inset;
    }

    .focus-btn {
      background: linear-gradient(135deg, #0d9488 0%, #06b6d4 55%, #3b82f6 100%);
      box-shadow: 0 4px 24px rgba(13,148,136,0.38), 0 0 0 1px rgba(255,255,255,0.08) inset;
    }

    .btn-icon { font-size: 20px; }

    /* ===== FOCUS MODE PAGE ===== */
    .focus-page {
      display: none;
      min-height: 100vh;
    }

    .focus-page.active {
      display: block;
    }

    /* Main Content */
    .main-content {
      margin-top: 68px; /* below the shared top bar */
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== SEARCH AREA ===== */
    .search-wrapper {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .search-row {
      display: flex;
      width: 100%;
      align-items: center;
      gap: 10px;
    }

    .search-box {
      display: flex;
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 0 16px;
      height: 48px;
      align-items: center;
      transition: border-color 0.2s, background 0.2s;
    }

    .search-box:focus-within {
      border-color: #3ea6ff;
      background: rgba(62,166,255,0.07);
    }

    #searchInput {
      background: transparent;
      border: none;
      color: #f1f1f1;
      font-size: 15px;
      font-family: "Nunito", sans-serif;
      width: 100%;
      outline: none;
    }

    #searchInput::placeholder {
      color: rgba(255,255,255,0.35);
    }

    /* BIG centered search button */
    .search-btn {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      box-shadow: 0 4px 20px rgba(59,130,246,0.45);
      transition: transform 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
    }

    .search-btn:active {
      transform: scale(0.93);
      box-shadow: 0 2px 10px rgba(59,130,246,0.3);
    }

    /* Warning Box */
    .warning-box {
      width: 100%;
      max-width: 480px;
      background: rgba(30,30,50,0.85);
      border: 1.5px solid #3ea6ff;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      display: none;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 32px rgba(62,166,255,0.12);
    }

    .warning-box.active {
      display: block;
    }

    .warning-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .warning-icon {
      color: #3ea6ff;
      font-size: 18px;
    }

    .warning-text {
      color: #f1f1f1;
      font-size: 15px;
      font-weight: 700;
    }

    .warning-countdown {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      margin-bottom: 14px;
    }

    .warning-buttons {
      display: flex;
      gap: 10px;
    }

    .warning-btn {
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      font-family: "Nunito", sans-serif;
      cursor: pointer;
      border: none;
      flex: 1;
      transition: opacity 0.2s, transform 0.15s;
    }

    .warning-btn:active { transform: scale(0.96); }

    .continue-btn {
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      color: white;
    }

    .continue-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .cancel-btn {
      background: rgba(255,255,255,0.09);
      color: #f1f1f1;
      border: 1px solid rgba(255,255,255,0.12);
    }

    /* Search Hint */
    .search-hint {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 22px 20px;
      text-align: center;
    }

    .hint-title {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.8);
      margin-bottom: 10px;
      letter-spacing: 0.3px;
    }

    .hint-text {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      line-height: 1.7;
    }

    .hint-keywords {
      color: #3ea6ff;
      font-weight: 600;
    }

  </style>
</head>
<body>

  <!-- Sidebar Menu -->
  <div id="sidebar" class="sidebar">
    <a href="#">🏠 Home</a>
    <a href="#">⚙️ Settings</a>
    <a href="#">ℹ️ About</a>
  </div>

  <!-- SHARED TOP BAR (always visible, always on top) -->
  <div class="top-bar" id="topBar">
    <div class="hamburger" id="hamburger" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="app-title" onclick="goToLanding()">
      <div class="yt-icon"></div>
      <span class="app-title-text">YouTube</span>
      <span class="app-title-sub">Focus</span>
    </div>
    <div class="profile-icon">
      <img src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Profile_avatar_placeholder_large.png" alt="Profile">
    </div>
  </div>

  <!-- LANDING PAGE -->
  <div class="landing-page" id="landingPage">
    <div class="welcome-section">
      <div class="welcome-line1">Welcome 👋</div>
      <div class="welcome-line2">Choose your mode to get started</div>
    </div>

    <div class="mode-buttons">
      <button class="mode-btn casual-btn" onclick="openCasualMode()">
        <span class="btn-icon">▶️</span>
        <span>Casual Mode</span>
        <span class="btn-icon">❤️</span>
      </button>
      <button class="mode-btn focus-btn" onclick="openFocusMode()">
        <span>Focus Mode</span>
        <span class="btn-icon">🎯</span>
      </button>
    </div>
  </div>

  <!-- FOCUS MODE PAGE -->
  <div class="focus-page" id="focusPage">
    <div class="main-content">

      <!-- Warning Box -->
      <div class="warning-box" id="warningBox">
        <div class="warning-title">
          <span class="warning-icon">ℹ️</span>
          <span class="warning-text">Non-study search detected</span>
        </div>
        <div class="warning-countdown" id="warningCountdown"></div>
        <div class="warning-buttons">
          <button class="warning-btn continue-btn" id="continueBtn" onclick="continueSearch()">Continue Anyway</button>
          <button class="warning-btn cancel-btn" onclick="cancelSearch()">Cancel Search</button>
        </div>
      </div>

      <!-- Search Row -->
      <div class="search-wrapper">
        <div class="search-row">
          <div class="search-box">
            <input id="searchInput" placeholder="Search study content…" type="text">
          </div>
          <button class="search-btn" onclick="handleSearch()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
          </button>
        </div>

        <!-- Search Hint -->
        <div class="search-hint" id="searchHint">
          <div class="hint-title">Focus Search 🎯</div>
          <div class="hint-text">
            Study-related searches go straight through.<br>
            Allowed: <span class="hint-keywords">class 9, class 10, ICSE, physics, chemistry, maths, biology, lecture, tutorial, course, study</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    function toggleMenu() {
      document.getElementById("sidebar").classList.toggle("active");
      document.getElementById("hamburger").classList.toggle("active");
    }

    let pendingQuery = '';
    let countdownInterval = null;
    let countdownTime = 10;

    const studyKeywords = [
      "course", "class 10", "class 9", "icse", "cbse", "ncert",
      "math", "maths", "mathematics", "physics", "chem", "chemistry",
      "bio", "biology", "tutorial", "lecture", "study", "education",
      "learning", "exam", "test", "notes", "chapter", "solution",
      "beginner", "advanced", "academic", "school", "college", "university"
    ];

    function openCasualMode() {
      window.location.href = "https://www.youtube.com";
    }

    function openFocusMode() {
      document.getElementById("landingPage").style.display = "none";
      document.getElementById("focusPage").classList.add("active");
      document.getElementById("topBar").classList.add("focus-bar");
    }

    function goToLanding() {
      document.getElementById("focusPage").classList.remove("active");
      document.getElementById("landingPage").style.display = "flex";
      document.getElementById("topBar").classList.remove("focus-bar");
      cancelSearch();
      document.getElementById("searchInput").value = "";
    }

    function isStudyRelated(query) {
      const lowerQuery = query.toLowerCase().trim();
      return studyKeywords.some(keyword => lowerQuery.includes(keyword.toLowerCase()));
    }

    function redirectToYouTube(query) {
      const encodedQuery = encodeURIComponent(query);
      window.location.href = `intent://www.youtube.com/results?search_query=${encodedQuery}#Intent;package=app.revanced.android.youtube;scheme=https;end`;
    }

    function handleSearch() {
      const query = document.getElementById("searchInput").value.trim();
      if (!query) return;
      if (isStudyRelated(query)) {
        redirectToYouTube(query);
      } else {
        showWarning(query);
      }
    }

    function showWarning(query) {
      pendingQuery = query;
      const warningBox = document.getElementById("warningBox");
      const warningCountdown = document.getElementById("warningCountdown");
      const continueBtn = document.getElementById("continueBtn");
      const searchHint = document.getElementById("searchHint");

      warningBox.classList.add("active");
      searchHint.style.display = "none";

      countdownTime = 10;
      updateCountdownDisplay();

      continueBtn.disabled = true;

      countdownInterval = setInterval(() => {
        countdownTime--;
        updateCountdownDisplay();
        if (countdownTime <= 0) {
          clearInterval(countdownInterval);
          continueBtn.disabled = false;
          warningCountdown.textContent = "You can now continue to search";
        }
      }, 1000);
    }

    function updateCountdownDisplay() {
      const warningCountdown = document.getElementById("warningCountdown");
      if (countdownTime > 0) {
        warningCountdown.textContent = `Please wait ${countdownTime} seconds before continuing...`;
      }
    }

    function continueSearch() {
      if (countdownTime > 0) return;
      if (pendingQuery) {
        redirectToYouTube(pendingQuery);
      }
    }

    function cancelSearch() {
      clearInterval(countdownInterval);
      countdownInterval = null;
      pendingQuery = "";
      countdownTime = 10;

      document.getElementById("warningBox").classList.remove("active");
      document.getElementById("searchHint").style.display = "block";
      document.getElementById("searchInput").value = "";
      document.getElementById("searchInput").focus();
    }

    document.getElementById("searchInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") handleSearch();
    });
  
  if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.log("SW failed:", err));
}
  </script>
</body>
</html>
