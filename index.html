<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Mode</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient();
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.95rem;
      margin-bottom: 40px;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 20px;
      color: rgba(255, 255, 255, 0.9);
    }

    input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.2);
      color: #ffffff;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: all 0.2s ease;
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    input:focus {
      border-color: rgba(102, 126, 234, 0.5);
      background: rgba(0, 0, 0, 0.3);
    }

    button {
      width: 100%;
      padding: 14px 24px;
      margin-top: 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-weight: 500;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    .timer-display {
      font-size: 4rem;
      font-weight: 300;
      letter-spacing: -2px;
      margin: 20px 0 10px 0;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #ffffff 0%, rgba(255,255,255,0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .mode-label {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 24px;
    }

    .timer-controls {
      display: flex;
      gap: 12px;
    }

    .timer-controls button {
      flex: 1;
      margin-top: 0;
    }

    .timer-controls button.secondary {
      background: rgba(255, 255, 255, 0.1);
      box-shadow: none;
    }

    .timer-controls button.secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .icon {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 2rem;
      }

      .timer-display {
        font-size: 3rem;
      }

      .glass-card {
        padding: 24px;
      }
    }
  </style>
</head>

<body>

  <h1>⚡ Focus Mode</h1>
  <p class="subtitle">Stay productive, one session at a time</p>

  <div class="glass-card">
    <div class="icon">📚</div>
    <h3 class="card-title">What do you want to learn?</h3>
    <input id="topic" placeholder="e.g. Newton's Laws">
    <button onclick="openYT()">Search YouTube</button>
  </div>

  <div class="glass-card">
    <div class="icon">⏱️</div>
    <div class="timer-display" id="timer">30:00</div>
    <div class="mode-label" id="mode">Study Time</div>
    <div class="timer-controls">
      <button onclick="startTimer()" id="startBtn">Start</button>
      <button onclick="resetTimer()" class="secondary">Reset</button>
    </div>
  </div>

  <div class="glass-card">
    <div class="icon">🔔</div>
    <h3 class="card-title">Set Reminder</h3>
    <input id="reminderTime" placeholder="Minutes (e.g. 20)">
    <button onclick="setReminder()">Set Reminder</button>
  </div>

  <script>
    let studyTime = 30 * 60;
    let breakTime = 5 * 60;
    let isStudy = true;
    let interval;
    let isRunning = false;

    function startTimer() {
      if (isRunning) {
        clearInterval(interval);
        isRunning = false;
        document.getElementById("startBtn").innerText = "Resume";
        return;
      }

      isRunning = true;
      document.getElementById("startBtn").innerText = "Pause";

      let time = isStudy ? studyTime : breakTime;

      interval = setInterval(() => {
        let minutes = Math.floor(time / 60);
        let seconds = time % 60;

        document.getElementById("timer").innerText =
          minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

        time--;

        if (time < 0) {
          clearInterval(interval);
          isRunning = false;

          if (isStudy) {
            alert("🎉 Break Time! Take 5 minutes to recharge.");
          } else {
            alert("📚 Back to Study! Let's stay focused.");
          }

          isStudy = !isStudy;
          document.getElementById("mode").innerText = isStudy ? "Study Time" : "Break Time";
          document.getElementById("timer").innerText = isStudy ? "30:00" : "05:00";
          document.getElementById("startBtn").innerText = "Start";
        }
      }, 1000);
    }

    function resetTimer() {
      clearInterval(interval);
      isRunning = false;
      isStudy = true;
      document.getElementById("timer").innerText = "30:00";
      document.getElementById("mode").innerText = "Study Time";
      document.getElementById("startBtn").innerText = "Start";
    }

    function openYT() {
      let topic = document.getElementById("topic").value;

      if (topic.trim() === "") {
        alert("Enter a topic first!");
        return;
      }

      let confirmOpen = confirm("Open YouTube for this topic?");

      if (!confirmOpen) return;

      setTimeout(() => {
        window.open(
          "https://www.youtube.com/results?search_query=" + encodeURIComponent(topic),
          "_blank"
        );
      }, 1000);
    }

    function setReminder() {
      let mins = document.getElementById("reminderTime").value;

      if (!mins || mins <= 0) {
        alert("Enter a valid time in minutes");
        return;
      }

      setTimeout(() => {
        alert("⏰ Reminder: Get back to focus!");
      }, mins * 60 * 1000);

      alert("Reminder set for " + mins + " minutes!");
    }
  </script>

</body>
</html>
