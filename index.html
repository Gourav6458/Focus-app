<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube</title>
  
  <!-- Favicon for home screen icon -->
  <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png">
  <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png">
  <meta name="apple-mobile-web-app-title" content="YouTube">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', 'Arial', sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
    }

    /* Header - YouTube Style */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0f0f0f;
      padding: 0 16px;
      height: 56px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      border-bottom: 1px solid #272727;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .youtube-logo {
      display: flex;
      align-items: center;
      gap: 2px;
      text-decoration: none;
    }

    .logo-icon {
      width: 32px;
      height: 22px;
      background: #ff0000;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .logo-icon::after {
      content: '';
      width: 0;
      height: 0;
      border-left: 10px solid white;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      margin-left: 2px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: white;
      letter-spacing: -1px;
    }

    /* Search Bar - YouTube Style */
    .search-container {
      flex: 0 1 640px;
      display: flex;
      align-items: center;
      margin: 0 40px;
    }

    .search-box {
      display: flex;
      flex: 1;
      background: #121212;
      border: 1px solid #303030;
      border-radius: 40px 0 0 40px;
      padding: 0 16px;
      height: 40px;
      align-items: center;
    }

    .search-box:focus-within {
      border-color: #1c62b9;
    }

    #topic {
      background: transparent;
      border: none;
      color: #f1f1f1;
      font-size: 16px;
      width: 100%;
      outline: none;
    }

    #topic::placeholder {
      color: #888;
    }

    .search-btn {
      background: #222;
      border: 1px solid #303030;
      border-left: none;
      border-radius: 0 40px 40px 0;
      width: 64px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #f1f1f1;
    }

    .search-btn:hover {
      background: #303030;
    }

    /* Main Content */
    .main-content {
      margin-top: 56px;
      padding: 24px 16px;
      max-width: 1280px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Warning Message */
    .warning-box {
      background: #282828;
      border: 1px solid #3ea6ff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      display: none;
      align-items: center;
      gap: 12px;
    }

    .warning-box.active {
      display: flex;
    }

    .warning-icon {
      color: #3ea6ff;
      font-size: 20px;
    }

    .warning-text {
      color: #f1f1f1;
      font-size: 14px;
    }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 24px;
      padding: 16px;
      background: #1f1f1f;
      border-radius: 12px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #aaa;
    }

    .stat-value {
      color: #ff0000;
      font-weight: 600;
      font-size: 18px;
    }

    /* Video Grid */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .video-card {
      background: #0f0f0f;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .video-card:hover {
      transform: scale(1.02);
    }

    .thumbnail {
      width: 100%;
      aspect-ratio: 16/9;
      background: #272727;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }

    .thumbnail::before {
      content: '';
      width: 48px;
      height: 48px;
      background: rgba(0,0,0,0.6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumbnail::after {
      content: '';
      position: absolute;
      width: 0;
      height: 0;
      border-left: 16px solid white;
      border-top: 10px solid transparent;
      border-bottom: 10px solid transparent;
      margin-left: 6px;
    }

    .video-info {
      padding: 0 4px;
    }

    .video-title {
      font-size: 14px;
      font-weight: 500;
      color: #f1f1f1;
      line-height: 1.4;
      margin-bottom: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-meta {
      font-size: 12px;
      color: #aaa;
    }

    /* Timer Section */
    .timer-section {
      background: #1f1f1f;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      text-align: center;
    }

    .timer-display {
      font-size: 48px;
      font-weight: 300;
      color: #f1f1f1;
      font-variant-numeric: tabular-nums;
      margin-bottom: 8px;
    }

    .timer-mode {
      font-size: 14px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .timer-btn {
      background: #cc0000;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .timer-btn:hover {
      background: #990000;
    }

    /* Reminder Section */
    .reminder-section {
      background: #1f1f1f;
      border-radius: 12px;
      padding: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .reminder-input {
      background: #121212;
      border: 1px solid #303030;
      border-radius: 20px;
      padding: 10px 16px;
      color: #f1f1f1;
      width: 200px;
      font-size: 14px;
    }

    .reminder-btn {
      background: #3ea6ff;
      color: #0f0f0f;
      border: none;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .reminder-btn:hover {
      background: #65b8ff;
    }

    /* Section Titles */
    .section-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #f1f1f1;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .search-container {
        margin: 0 16px;
      }
      
      .video-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-section">
    <a href="#" class="youtube-logo">
      <div class="logo-icon"></div>
      <span class="logo-text">YouTube</span>
    </a>
  </div>
  
  <div class="search-container">
    <div class="search-box">
      <input id="topic" placeholder="Search" type="text">
    </div>
    <button class="search-btn" onclick="handleSearch()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
    </button>
  </div>
  
  <div style="width: 40px;"></div>
</header>

<div class="main-content">

  <!-- Warning -->
  <div class="warning-box" id="warningBox">
    <span class="warning-icon">ℹ️</span>
    <span class="warning-text" id="warning"></span>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-item">
      <span>Videos Watched:</span>
      <span class="stat-value" id="count">0</span>
    </div>
  </div>

  <!-- Videos -->
  <div class="section-title">Results</div>
  <div class="video-grid" id="videos"></div>

  <!-- Timer -->
  <div class="section-title">Focus Timer</div>
  <div class="timer-section">
    <div class="timer-display" id="timer">30:00</div>
    <div class="timer-mode" id="mode">Study Time</div>
    <button class="timer-btn" onclick="startTimer()">Start Session</button>
  </div>

  <!-- Reminder -->
  <div class="section-title">Set Reminder</div>
  <div class="reminder-section">
    <input id="reminderTime" class="reminder-input" placeholder="Minutes" type="number">
    <button class="reminder-btn" onclick="setReminder()">Set Reminder</button>
  </div>

</div>

<script>
let count = localStorage.getItem("videoCount") || 0;
document.getElementById("count").innerText = count;

// KEYWORD FILTER SEARCH
function handleSearch() {
  let topic = document.getElementById("topic").value.toLowerCase().trim();
  let warning = document.getElementById("warning");
  let warningBox = document.getElementById("warningBox");

  if (!topic) {
    alert("Enter topic!");
    return;
  }

  let keywords = [
    "course","class 10","class 9","icse",
    "math","maths","physics","chem","chemistry",
    "bio","biology","tutorial","lecture",
    "beginner","advanced","exphub","shobhit"
  ];

  let isValid = keywords.some(word => topic.includes(word));

  if (isValid) {
    warningBox.classList.remove("active");
    generateVideos(topic);
  } else {
    warningBox.classList.add("active");
    warning.innerText = "Non-study search detected. Waiting 10 sec...";

    let time = 10;
    let interval = setInterval(() => {
      warning.innerText = "Non-study search detected. Opening in " + time + " sec...";
      time--;

      if (time < 0) {
        clearInterval(interval);
        warningBox.classList.remove("active");
        generateVideos(topic);
      }
    }, 1000);
  }
}

// VIDEO GENERATOR
function generateVideos(topic) {
  let container = document.getElementById("videos");
  container.innerHTML = "";

  for (let i = 1; i <= 5; i++) {
    let card = document.createElement("div");
    card.className = "video-card";
    
    card.innerHTML = `
      <div class="thumbnail"></div>
      <div class="video-info">
        <div class="video-title">${topic} - Video ${i}</div>
        <div class="video-meta">FocusTube • Educational</div>
      </div>
    `;

    card.onclick = function () {
      count++;
      localStorage.setItem("videoCount", count);
      document.getElementById("count").innerText = count;

      window.location.href =
        "https://www.youtube.com/results?search_query=" +
        encodeURIComponent(topic) +
        "&sp=EgIQAQ%253D%253D";
    };

    container.appendChild(card);
  }
}

// TIMER SYSTEM
let study = 30 * 60;
let brk = 5 * 60;
let isStudy = true;
let timerInterval;

function startTimer() {
  clearInterval(timerInterval);

  let time = isStudy ? study : brk;

  timerInterval = setInterval(() => {
    let m = Math.floor(time / 60);
    let s = time % 60;

    document.getElementById("timer").innerText =
      m + ":" + (s < 10 ? "0" : "") + s;

    time--;

    if (time < 0) {
      clearInterval(timerInterval);

      alert(isStudy ? "Break Time!" : "Back to Study!");

      isStudy = !isStudy;
      document.getElementById("mode").innerText =
        isStudy ? "Study Time" : "Break Time";

      startTimer();
    }

  }, 1000);
}

// REMINDER
function setReminder() {
  let mins = document.getElementById("reminderTime").value;

  if (!mins) {
    alert("Enter time");
    return;
  }

  setTimeout(() => {
    alert("Reminder: Back to focus!");
  }, mins * 60000);

  alert("Reminder set!");
}

// Allow Enter key to search
document.getElementById("topic").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    handleSearch();
  }
});
</script>

</body>
</html>
