<!DOCTYPE html>
<html>
<head>
  <title>YouTube</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: white;
      text-align: center;
    }

    header {
      background: #111;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      color: #ff0000;
    }

    input {
      padding: 12px;
      width: 260px;
      border-radius: 20px;
      border: none;
      margin-top: 15px;
      background: #1f1f1f;
      color: white;
    }

    button {
      padding: 10px 18px;
      margin-top: 10px;
      border-radius: 20px;
      border: none;
      background: #ff0000;
      color: white;
      font-weight: bold;
    }

    .section {
      margin-top: 30px;
    }

    .video {
      margin: 10px auto;
      width: 80%;
      padding: 12px;
      background: #1f1f1f;
      border-radius: 10px;
      cursor: pointer;
      text-align: left;
    }

    .counter {
      margin-top: 10px;
      color: #ff0000;
      font-size: 18px;
    }

    .timer {
      font-size: 28px;
      margin-top: 10px;
    }

    .mode {
      opacity: 0.7;
    }

    .warning {
      color: #ff4d4d;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header style="display:flex; align-items:center; justify-content:center; gap:10px; background:#111; padding:15px;">

  <!-- YouTube Logo -->
  <div style="
    width:28px;
    height:20px;
    background:#ff0000;
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
  ">
    <div style="
      width:0;
      height:0;
      border-left:10px solid white;
      border-top:6px solid transparent;
      border-bottom:6px solid transparent;
      margin-left:2px;
    "></div>
  </div>

  <!-- Text -->
  <span style="font-size:20px; font-weight:bold; color:white;">
    FocusTube
  </span>

</header>

<!-- SEARCH -->
<div class="section">
  <input id="topic" placeholder="Search topic"><br>
  <button onclick="handleSearch()">Search</button>
  <div class="warning" id="warning"></div>
</div>

<!-- VIDEO COUNT -->
<div class="counter">
  Videos Watched: <span id="count">0</span>
</div>

<!-- VIDEO LIST -->
<div id="videos"></div>

<!-- TIMER -->
<div class="section">
  <div class="timer" id="timer">30:00</div>
  <div class="mode" id="mode">Study Time</div>
  <button onclick="startTimer()">Start Session</button>
</div>

<!-- REMINDER -->
<div class="section">
  <input id="reminderTime" placeholder="Reminder (min)">
  <br>
  <button onclick="setReminder()">Set Reminder</button>
</div>

<script>
let count = localStorage.getItem("videoCount") || 0;
document.getElementById("count").innerText = count;

// 🎯 KEYWORD FILTER SEARCH
function handleSearch() {
  let topic = document.getElementById("topic").value.toLowerCase().trim();
  let warning = document.getElementById("warning");

  if (!topic) {
    alert("Enter topic!");
    return;
  }

  let keywords = [
    "course","class 10","class 9","icse",
    "math","maths","physics","chem","chemistry",
    "bio","biology","tutorial","lecture",
    "beginner","advanced","exphub","shobhit"
  ];

  let isValid = keywords.some(word => topic.includes(word));

  if (isValid) {
    generateVideos(topic);
  } else {
    warning.innerText = "⚠ Non-study search detected. Waiting 10 sec...";

    let time = 10;
    let interval = setInterval(() => {
      warning.innerText = "⚠ Opening in " + time + " sec...";
      time--;

      if (time < 0) {
        clearInterval(interval);
        warning.innerText = "";
        generateVideos(topic);
      }
    }, 1000);
  }
}

// 🎥 VIDEO GENERATOR
function generateVideos(topic) {
  let container = document.getElementById("videos");
  container.innerHTML = "";

  for (let i = 1; i <= 5; i++) {
    let div = document.createElement("div");
    div.className = "video";
    div.innerText = topic + " - Video " + i;

    div.onclick = function () {
      count++;
      localStorage.setItem("videoCount", count);
      document.getElementById("count").innerText = count;

      window.location.href =
        "https://www.youtube.com/results?search_query=" +
        encodeURIComponent(topic) +
        "&sp=EgIQAQ%253D%253D";
    };

    container.appendChild(div);
  }
}

// ⏱️ TIMER SYSTEM
let study = 30 * 60;
let brk = 5 * 60;
let isStudy = true;
let timerInterval;

function startTimer() {
  clearInterval(timerInterval);

  let time = isStudy ? study : brk;

  timerInterval = setInterval(() => {
    let m = Math.floor(time / 60);
    let s = time % 60;

    document.getElementById("timer").innerText =
      m + ":" + (s < 10 ? "0" : "") + s;

    time--;

    if (time < 0) {
      clearInterval(timerInterval);

      alert(isStudy ? "Break Time!" : "Back to Study!");

      isStudy = !isStudy;
      document.getElementById("mode").innerText =
        isStudy ? "Study Time" : "Break Time";

      startTimer();
    }

  }, 1000);
}

// 🔔 REMINDER
function setReminder() {
  let mins = document.getElementById("reminderTime").value;

  if (!mins) {
    alert("Enter time");
    return;
  }

  setTimeout(() => {
    alert("Reminder: Back to focus!");
  }, mins * 60000);

  alert("Reminder set!");
}
</script>

</body>
</html>
