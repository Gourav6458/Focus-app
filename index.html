<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YouTube Focus</title>
  <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png">
  <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png">
  <meta name="apple-mobile-web-app-title" content="YouTube Focus">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <style>
    /* --- YOUR ORIGINAL UI (UNCHANGED) --- */
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Roboto','Arial',sans-serif; background:#0f0f0f; color:#f1f1f1; min-height:100vh; max-width:100vw; overflow-x:hidden;}
    .landing-page { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:24px;}
    .landing-title { font-size:24px; font-weight:500; margin-bottom:48px; text-align:center;}
    .mode-buttons { display:flex; flex-direction:column; gap:16px; width:100%; max-width:280px;}
    .mode-btn { padding:16px 32px; border-radius:24px; font-size:16px; font-weight:500; cursor:pointer; border:none; width:100%;}
    .casual-btn { background:#272727; color:#f1f1f1;}
    .focus-btn { background:#cc0000; color:white;}
    .focus-page { display:none; min-height:100vh;}
    .focus-page.active { display:block;}
    header { display:flex; align-items:center; justify-content:space-between; background:#0f0f0f; padding:0 12px; height:56px; position:fixed; top:0; left:0; right:0; border-bottom:1px solid #272727;}
    .search-container { flex:1; display:flex; align-items:center; margin:0 12px;}
    .search-box { display:flex; flex:1; background:#121212; border:1px solid #303030; border-radius:40px 0 0 40px; padding:0 12px; height:36px; align-items:center;}
    #searchInput { background:transparent; border:none; color:#f1f1f1; font-size:14px; width:100%; outline:none;}
    .search-btn { background:#222; border:1px solid #303030; border-left:none; border-radius:0 40px 40px 0; width:48px; height:36px; cursor:pointer; color:#f1f1f1;}
    .main-content { margin-top:56px; padding:16px 12px;}
    .warning-box { background:#282828; border:1px solid #3ea6ff; border-radius:12px; padding:16px; margin-bottom:16px; display:none;}
    .warning-box.active { display:block;}
    .search-hint { background:#1f1f1f; border-radius:12px; padding:20px; text-align:center;}
  </style>
</head><body><div class="landing-page" id="landingPage">
  <h1 class="landing-title">Choose Your Mode</h1>
  <div class="mode-buttons">
    <button class="mode-btn casual-btn" onclick="openCasualMode()">Casual Mode</button>
    <button class="mode-btn focus-btn" onclick="openFocusMode()">Focus Mode</button>
  </div>
</div><div class="focus-page" id="focusPage">
  <header>
    <div></div>
    <div class="search-container">
      <div class="search-box">
        <input id="searchInput" placeholder="Search" type="text">
      </div>
      <button class="search-btn" onclick="handleSearch()">🔍</button>
    </div>
    <div></div>
  </header>  <div class="main-content">
    <div class="warning-box" id="warningBox"></div><div class="search-hint" id="searchHint">
  Focus Search (study only)
</div>

  </div>
</div><script>
let pendingQuery = '';
let countdownInterval = null;
let countdownTime = 10;

const studyKeywords = ["course","class 10","class 9","math","physics","chemistry","biology","tutorial","lecture","study"];

// ✅ Casual Mode (normal YouTube app + fallback)
function openCasualMode() {
  window.location.href = "intent://www.youtube.com/#Intent;package=com.google.android.youtube;scheme=https;end";

  setTimeout(() => {
    window.location.href = "https://www.youtube.com";
  }, 1500);
}

// ✅ Focus Mode (ReVanced + fallback)
function openFocusMode() {
  window.location.href = "intent://www.youtube.com/#Intent;package=app.revanced.android.youtube;scheme=https;end";

  setTimeout(() => {
    window.location.href = "https://www.youtube.com";
  }, 1500);
}

function isStudyRelated(query) {
  const q = query.toLowerCase();
  return studyKeywords.some(k => q.includes(k));
}

// ✅ Search → ReVanced + fallback
function redirectToYouTube(query) {
  const encodedQuery = encodeURIComponent(query);

  window.location.href = `intent://www.youtube.com/results?search_query=${encodedQuery}#Intent;package=app.revanced.android.youtube;scheme=https;end`;

  setTimeout(() => {
    window.location.href = `https://www.youtube.com/results?search_query=${encodedQuery}`;
  }, 1500);
}

function handleSearch() {
  const query = document.getElementById("searchInput").value.trim();
  if (!query) return;

  if (isStudyRelated(query)) {
    redirectToYouTube(query);
  } else {
    alert("Non-study search blocked (focus mode)");
  }
}

document.getElementById("searchInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") handleSearch();
});
</script></body>
</html>
